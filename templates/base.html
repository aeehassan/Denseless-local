<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DenseLess — A student-centric Generative AI learning platform." />

    <title>{% block title %}DenseLess{% endblock %}</title>

    <!-- Global Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css" />

    <!-- Google Fonts — Inter for clean, modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    />
</head>
<body>
    <!-- ── Top Navigation ─────────────────────────────── -->
    <header id="main-header">
        <nav>
            <a href="/" class="logo">DenseLess</a>
        </nav>
    </header>

    <!-- ── Page Content ───────────────────────────────── -->
    <main id="main-content">
        {% block content %}
        <h1>Welcome to DenseLess</h1>
        <p>Your AI-powered learning companion.</p>
        {% endblock %}
    </main>

    <!-- ── Footer ─────────────────────────────────────── -->
    <footer id="main-footer">
        <p>&copy; 2026 DenseLess. Built for learning.</p>
    </footer>

    <!-- Global JS -->
    <script src="/static/js/main.js"></script>

    <!-- Page-specific scripts -->
    {% block scripts %}{% endblock %}
</body>
</html>
